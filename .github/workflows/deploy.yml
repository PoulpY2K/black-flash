name: Deploy to production

on:
  registry_package:
    types: [ published ]

jobs:
  check-tag:
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    outputs:
      is-release: ${{ steps.validate.outputs.is-release }}
    steps:
      - name: Validate semver tag format (v*.*.*)
        id: validate
        run: |
          if echo "${{ github.ref_name }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "is-release=true" >> $GITHUB_OUTPUT
          else
            echo "is-release=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: check-tag
    runs-on: ubuntu-latest
    if: ${{ needs.check-tag.outputs.is-release == 'true' }}
    steps:
      - name: Execute remote SSH commands using SSH key
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            ${{ secrets.SSH_SCRIPT }}